kind = "web"
previewPath = "/"
title = "House Hunting Kisii"
version = "1.0.0"
id = "artifacts/house-hunting-kisii"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26202

[services.development]
run = "pnpm --filter @workspace/house-hunting-kisii run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/house-hunting-kisii", "run", "build" ]
publicDir = "artifacts/house-hunting-kisii/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26202"
BASE_PATH = "/"
